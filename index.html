<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emoji Level Up Game</title>
    <style>
        body {
            margin: 0;
            background: #222;
            color: #fff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        #ui {
            margin-bottom: 20px;
            font-size: 24px;
            font-weight: bold;
        }
        #game-container {
            width: 800px;
            height: 400px;
            background: #333;
            border: 4px solid #555;
            position: relative;
            overflow: hidden;
            border-radius: 8px;
        }
        .game-object {
            position: absolute;
            font-size: 40px;
            user-select: none;
            transform: translate(-50%, -50%);
            transition: left 0.1s linear;
        }
        #instructions {
            margin-top: 20px;
            color: #aaa;
            text-align: center;
        }
        #game-over-screen {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }
        #game-over-screen h1 {
            color: #ff4a4a;
            font-size: 48px;
            margin-bottom: 10px;
        }
        #restart-btn {
            padding: 10px 20px;
            font-size: 18px;
            background: #ff4a4a;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        #restart-btn:hover {
            background: #ff2a2a;
        }
    </style>
</head>
<body>
    <div id="ui">Livello: <span id="level-display">1</span></div>
    
    <div id="game-container">
        <div id="player" class="game-object" style="left: 400px; top: 350px;">🕴🏿</div>
        
        <div id="game-over-screen">
            <h1>GAME OVER</h1>
            <p>Hai mangiato un kebab al livello 1!</p>
            <button id="restart-btn" onclick="restartGame()">Riprova</button>
        </div>
    </div>

    <div id="instructions">
        Usa le frecce <strong>DESTRA</strong> e <strong>SINISTRA</strong> per muoverti.<br>
        Prendi 🦶🏻 per salire di livello. Evita 🥙 o scenderai di livello!<br>
        Raggiungi il livello 20 per sbloccare la trasformazione.
    </div>

    <script>
        const container = document.getElementById('game-container');
        const player = document.getElementById('player');
        const levelDisplay = document.getElementById('level-display');
        const gameOverScreen = document.getElementById('game-over-screen');
        
        // --- CONFIGURAZIONE EFFETTI AUDIO ---
        const sndLevelUp = new Audio('level-up.mp3');
        const sndLevel20 = new Audio('level-20.mp3'); // Nuovo suono trasformazione
        const sndLevelDown = new Audio('level-down.mp3');
        const sndGameOver = new Audio('game-over.mp3');
        const sndMove = new Audio('move.mp3');        // Nuovo suono movimento
        
        // Musica di sottofondo
        const bgMusic = new Audio('background.mp3');
        bgMusic.loop = true; // Imposta la musica in loop continuo
        bgMusic.volume = 0.4; // Volume leggermente più basso per non coprire gli effetti

        // Flag per verificare se la musica è già partita (evita riavvii continui)
        let isMusicPlaying = false;

        function playSound(audioObject) {
            audioObject.currentTime = 0; 
            audioObject.play().catch(e => console.log("Audio in attesa di interazione utente"));
        }

        function startBackgroundMusic() {
            if (!isMusicPlaying) {
                bgMusic.play()
                    .then(() => { isMusicPlaying = true; })
                    .catch(e => console.log("Musica bloccata, in attesa del primo input"));
            }
        }
        // ------------------------------------

        let level = 1;
        let playerX = 400;
        const playerY = 350;
        const speed = 20;
        const containerWidth = 800;
        
        let isGameOver = false;
        let spawnTimeout; 
        let reachedLevel20 = false; // Serve per far suonare il livello 20 una volta sola

        window.addEventListener('keydown', (e) => {
            if (isGameOver) return; 
            
            // Fai partire la musica di sottofondo alla prima pressione di un tasto
            startBackgroundMusic();

            let moved = false;
            if (e.key === 'ArrowLeft') {
                playerX = Math.max(30, playerX - speed);
                moved = true;
            } else if (e.key === 'ArrowRight') {
                playerX = Math.min(containerWidth - 30, playerX + speed);
                moved = true;
            }
            
            if (moved) {
                player.style.left = playerX + 'px';
                playSound(sndMove); // <-- Riproduce il suono del passo
            }
        });

        function updatePlayerEmoji() {
            if (level >= 20) {
                player.textContent = '🕺';
            } else {
                player.textContent = '🕴🏿';
            }
        }

        function triggerGameOver() {
            isGameOver = true;
            clearTimeout(spawnTimeout); 
            bgMusic.pause(); // Ferma la musica di sottofondo quando si perde
            isMusicPlaying = false;
            playSound(sndGameOver); 
            gameOverScreen.style.display = 'flex'; 
        }

        function restartGame() {
            isGameOver = false;
            level = 1;
            playerX = 400;
            reachedLevel20 = false; // Resetta il controllo del livello 20
            player.style.left = playerX + 'px';
            levelDisplay.textContent = level;
            updatePlayerEmoji();
            gameOverScreen.style.display = 'none';
            
            const objects = document.querySelectorAll('.game-object:not(#player)');
            objects.forEach(obj => obj.remove());
            
            // Riavvia la musica di sottofondo
            bgMusic.currentTime = 0;
            startBackgroundMusic();
            
            startSpawning();
        }

        function spawnObject(type, emoji) {
            if (isGameOver) return;

            const obj = document.createElement('div');
            obj.className = 'game-object';
            obj.textContent = emoji;
            
            let objX = Math.floor(Math.random() * (containerWidth - 60)) + 30;
            let objY = 0;
            
            obj.style.left = objX + 'px';
            obj.style.top = objY + 'px';
            container.appendChild(obj);

            const fallInterval = setInterval(() => {
                if (isGameOver) {
                    clearInterval(fallInterval);
                    return;
                }

                objY += 5;
                obj.style.top = objY + 'px';
                
                if (objY >= 330 && objY <= 370 && Math.abs(objX - playerX) < 40) {
                    clearInterval(fallInterval);
                    obj.remove();
                    
                    if (type === 'up') {
                        level++;
                        levelDisplay.textContent = level;
                        updatePlayerEmoji();
                        
                        // Controllo se ha raggiunto il livello 20 per la prima volta
                        if (level >= 20 && !reachedLevel20) {
                            reachedLevel20 = true;
                            playSound(sndLevel20); // <-- Suono speciale livello 20
                        } else {
                            playSound(sndLevelUp); // <-- Suono normale Level Up
                        }
                    } else if (type === 'down') {
                        if (level === 1) {
                            triggerGameOver();
                        } else {
                            level = Math.max(1, level - 1);
                            
                            // Se scende sotto il livello 20, permette di riprodurre di nuovo l'effetto se ci ritorna
                            if (level < 20) reachedLevel20 = false; 
                            
                            levelDisplay.textContent = level;
                            updatePlayerEmoji();
                            playSound(sndLevelDown); 
                        }
                    }
                }

                if (objY > 400) {
                    clearInterval(fallInterval);
                    obj.remove();
                }
            }, 30);
        }

        function startSpawning() {
            if (isGameOver) return;

            let spawnDelay = Math.max(200, 1000 - (level * 40));

            if (Math.random() < 0.55) {
                spawnObject('down', '🥙');
            } else {
                spawnObject('up', '🦶');
            }

            spawnTimeout = setTimeout(startSpawning, spawnDelay);
        }

        startSpawning();
    </script>
</body>
</html>
