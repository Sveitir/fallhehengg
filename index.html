<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emoji Level Up Game</title>
    <style>
        body {
            margin: 0;
            background: #222;
            color: #fff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        #ui {
            margin-bottom: 20px;
            font-size: 24px;
            font-weight: bold;
        }
        #game-container {
            width: 800px;
            height: 400px;
            background: #333;
            border: 4px solid #555;
            position: relative;
            overflow: hidden;
            border-radius: 8px;
        }
        .game-object {
            position: absolute;
            font-size: 40px;
            user-select: none;
            transform: translate(-50%, -50%);
            transition: left 0.1s linear; /* Rende il movimento del giocatore più fluido */
        }
        #instructions {
            margin-top: 20px;
            color: #aaa;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="ui">Livello: <span id="level-display">1</span></div>
    
    <div id="game-container">
        <div id="player" class="game-object" style="left: 400px; top: 350px;">🕴🏿</div>
    </div>
    <div id="instructions">
        Usa le frecce <strong>DESTRA</strong> e <strong>SINISTRA</strong> per muoverti.<br>
        Prendi 🦶🏻 per salire di livello. Evita 🥙 o scenderai di livello!<br>
        Raggiungi il livello 20 per sbloccare la trasformazione.
    </div>
    <script>
        const container = document.getElementById('game-container');
        const player = document.getElementById('player');
        const levelDisplay = document.getElementById('level-display');
        let level = 1;
        let playerX = 400;
        const playerY = 350;
        const speed = 20;
        const containerWidth = 800;
        // Gestione del movimento del giocatore
        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') {
                playerX = Math.max(30, playerX - speed);
            } else if (e.key === 'ArrowRight') {
                playerX = Math.min(containerWidth - 30, playerX + speed);
            }
            player.style.left = playerX + 'px';
        });
        // Funzione per aggiornare l'aspetto del giocatore in base al livello
        function updatePlayerEmoji() {
            if (level >= 20) {
                player.textContent = '🕺';
            } else {
                player.textContent = '🕴🏿';
            }
        }
        // Funzione per creare gli oggetti che cadono (piedi e kebab)
        function spawnObject(type, emoji) {
            const obj = document.createElement('div');
            obj.className = 'game-object';
            obj.textContent = emoji;
            
            // Posizione X casuale all'interno del contenitore
            let objX = Math.floor(Math.random() * (containerWidth - 60)) + 30;
            let objY = 0;
            
            obj.style.left = objX + 'px';
            obj.style.top = objY + 'px';
            container.appendChild(obj);
            // Animazione di caduta
            const fallInterval = setInterval(() => {
                objY += 5;
                obj.style.top = objY + 'px';
                // Controllo collisione con il giocatore
                // Il giocatore si trova a Y = 350, controlliamo se l'oggetto è vicino alla sua area
                if (objY >= 330 && objY <= 370 && Math.abs(objX - playerX) < 40) {
                    clearInterval(fallInterval);
                    obj.remove();
                    
                    // Logica del livello
                    if (type === 'up') {
                        level++;
                    } else if (type === 'down') {
                        level = Math.max(1, level - 1); // Impedisce di scendere sotto il livello 1
                    }
                    
                    levelDisplay.textContent = level;
                    updatePlayerEmoji();
                }
                // Rimuove l'oggetto se esce dallo schermo
                if (objY > 400) {
                    clearInterval(fallInterval);
                    obj.remove();
                }
            }, 30);
        }
        // Genera costantemente oggetti a intervalli regolari
        setInterval(() => {
            // 60% di probabilità di generare un livello+ (🦶) e 40% di livello- (🥙)
            if (Math.random() > 0.4) {
                spawnObject('up', '🦶');
            } else {
                spawnObject('down', '🥙');
            }
        }, 1000); // Genera un oggetto ogni secondo
    </script>
</body>
</html>
